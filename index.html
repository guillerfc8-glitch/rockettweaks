<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rocket Optimizer</title>

<style>
body{
font-family:Arial;
background:radial-gradient(circle at top,#0b0f1f,#05060a);
color:#fff;
margin:0;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* 🎮 INTRO */
#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at center,#0d1b3a,#05060a);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

#intro h1{
font-size:52px;
color:#7c4dff;
text-shadow:0 0 20px #7c4dff, 0 0 40px #00e5ff;
animation:drop 0.9s ease;
letter-spacing:2px;
}

#intro p{
margin-top:10px;
color:#bcdcff;
text-align:center;
max-width:420px;
}

#intro button{
margin-top:20px;
padding:14px 30px;
border:none;
background:linear-gradient(90deg,#7c4dff,#00e5ff);
color:#fff;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
box-shadow:0 0 20px rgba(124,77,255,0.5);
}

#intro button:hover{
transform:scale(1.08);
box-shadow:0 0 35px rgba(0,229,255,0.8);
}

/* NAV */
header{
background:rgba(10,15,30,0.8);
backdrop-filter:blur(10px);
padding:15px;
text-align:center;
border-bottom:2px solid #7c4dff;
position:sticky;
top:0;
z-index:10;
}

header a{
color:#00e5ff;
margin:12px;
cursor:pointer;
font-weight:bold;
text-transform:uppercase;
letter-spacing:1px;
transition:0.2s;
}

header a:hover{
color:#7c4dff;
text-shadow:0 0 10px #7c4dff;
}

/* SECCIONES */
.page{
display:none;
max-width:850px;
margin:auto;
margin-top:40px;
background:rgba(15,20,40,0.8);
padding:30px;
border-radius:16px;
border:1px solid rgba(124,77,255,0.3);
backdrop-filter:blur(10px);
opacity:0;
transform:translateY(20px);
transition:0.6s ease;
}

.active{
display:block;
opacity:1;
transform:translateY(0);
}

/* PACKS */
.pack{
background:linear-gradient(145deg,#121a33,#0b1022);
padding:20px;
margin:12px 0;
border-radius:14px;
cursor:pointer;
border:1px solid rgba(0,229,255,0.3);
transition:0.25s;
}

.pack:hover{
transform:translateY(-4px) scale(1.01);
box-shadow:0 0 25px rgba(124,77,255,0.4);
border:1px solid #00e5ff;
}

/* BOTONES */
.buy{
background:linear-gradient(90deg,#7c4dff,#00e5ff);
padding:15px;
margin-top:20px;
text-align:center;
cursor:pointer;
border-radius:12px;
font-weight:bold;
transition:0.3s;
box-shadow:0 0 15px rgba(0,229,255,0.3);
}

.buy:hover{
transform:scale(1.05);
box-shadow:0 0 30px rgba(124,77,255,0.8);
}

img{
width:100%;
margin-top:20px;
border-radius:12px;
display:none;
}

/* RESEÑAS */
.review-box{
background:rgba(10,15,30,0.9);
border:1px solid #7c4dff;
box-shadow:0 0 20px rgba(124,77,255,0.3);
padding:25px;
border-radius:14px;
}

/* CONTACTO */
.contact-box{
background:rgba(10,15,30,0.9);
border:1px solid #00e5ff;
box-shadow:0 0 25px rgba(0,229,255,0.2);
padding:25px;
border-radius:14px;
text-align:center;
}

.contact-tag{
margin-top:10px;
padding:10px;
border-radius:10px;
background:rgba(124,77,255,0.15);
border:1px solid rgba(124,77,255,0.3);
}

.contact-discord{
color:#00e5ff;
font-weight:bold;
margin-top:15px;
}

/* ANIMACIONES */
@keyframes drop{
0%{transform:translateY(-60px);opacity:0;}
100%{transform:translateY(0);opacity:1;}
}

/* 📱 RESPONSIVE MÓVIL (YA INTEGRADO) */
@media (max-width: 768px){

body{
font-size:16px;
}

#intro h1{
font-size:34px;
text-align:center;
padding:0 10px;
}

#intro p{
font-size:14px;
padding:0 20px;
}

#intro button{
width:80%;
font-size:16px;
}

.page{
width:92%;
padding:18px;
margin-top:20px;
}

h2{
font-size:22px;
}

.pack{
font-size:15px;
padding:16px;
}

.buy{
font-size:16px;
padding:14px;
width:100%;
}

.contact-box,
.review-box{
padding:18px;
font-size:14px;
}

header{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
}

header a{
font-size:13px;
margin:6px;
}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h1>ROCKET OPTIMIZER</h1>
<p>AUMENTA FPS • REDUCE INPUT LAG • RENDIMIENTO COMPETITIVO</p>
<button onclick="goPacks()">ENTRAR A LA TIENDA</button>
</div>

<header>
<a onclick="show('inicio')">Inicio</a>
<a onclick="show('packs')">Packs</a>
<a onclick="show('reviews')">Reseñas</a>
<a onclick="show('faq')">FAQ</a>
<a onclick="show('discord')">Discord</a>
<a onclick="show('consultas')">Contacto</a>
</header>

<!-- INICIO -->
<div id="inicio" class="page active">
<div style="text-align:center;">
<h2 style="color:#00e5ff;text-shadow:0 0 15px #7c4dff;">
MEJORA DE RENDIMIENTO COMPETITIVO
</h2>

<p>Optimización para FPS, latencia y rendimiento en juegos.</p>

<div style="
margin-top:20px;
padding:20px;
background:rgba(124,77,255,0.1);
border:1px solid #7c4dff;
border-radius:12px;">
🔥 Menos input lag • Más FPS • Rendimiento estable
</div>

</div>
</div>

<!-- RESTO IGUAL (PACKS, ETC) -->
<!-- (NO TOCADO PARA RESPETAR TU DISEÑO) -->

<script>
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function mostrar(id){
document.querySelectorAll('img').forEach(i=>i.style.display='none');
document.getElementById(id).style.display='block';
}

function goPacks(){
document.getElementById('intro').style.display='none';
show('packs');
}
</script>

</body>
</html>
